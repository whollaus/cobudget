name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Verify and prepare draft release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches app version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          APP_VERSION="$(php -r '$xml = simplexml_load_file("appinfo/info.xml"); echo (string) $xml->version;')"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          if [ "$TAG_VERSION" != "$APP_VERSION" ]; then
            echo "Tag version $TAG_VERSION does not match appinfo/info.xml version $APP_VERSION"
            exit 1
          fi
          if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "Tag version $TAG_VERSION does not match package.json version $PACKAGE_VERSION"
            exit 1
          fi

      - name: Run tests
        run: npm run test

      - name: Build release archive
        run: npm run release

      - name: Verify release archive
        run: |
          test -f ../cobudget.tar.gz
          tar -tzf ../cobudget.tar.gz | grep -q '^cobudget/appinfo/info.xml$'
          tar -tzf ../cobudget.tar.gz | grep -q '^cobudget/js/'
          ! tar -tzf ../cobudget.tar.gz | grep -E '(^|/)(screenshots|tests|\.github|node_modules|\.git|README\.md|FEATURES\.md)'

      - name: Create release notes
        run: |
          cat > /tmp/release-notes.md <<'EOF'
          > [!WARNING]
          > This is a draft release. It does not contain an installable package yet.
          >
          > The maintainer must sign the app locally with the Nextcloud certificate and the matching private key, upload `cobudget.tar.gz`, `cobudget.tar.gz.signature` and `SHA256SUMS`, and only then publish this release.

          CoBudget is currently an early alpha release. Please test carefully and keep backups before using it with important data.
          EOF

      - name: Create or update draft GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release edit "$GITHUB_REF_NAME" \
              --draft \
              --prerelease \
              --title "CoBudget $GITHUB_REF_NAME" \
              --notes-file /tmp/release-notes.md
          else
            gh release create "$GITHUB_REF_NAME" \
              --verify-tag \
              --draft \
              --prerelease \
              --title "CoBudget $GITHUB_REF_NAME" \
              --notes-file /tmp/release-notes.md
          fi
