name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test-build:
    name: Test and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Show PHP version
        run: php -v

      - name: Run tests
        run: npm run test

      - name: Build frontend
        run: npm run build

      - name: Build release archive
        run: npm run release:tar

      - name: Verify release archive
        run: |
          test -f ../cobudget.tar.gz
          tar -tzf ../cobudget.tar.gz | grep -q '^cobudget/appinfo/info.xml$'
          tar -tzf ../cobudget.tar.gz | grep -q '^cobudget/js/'
          ! tar -tzf ../cobudget.tar.gz | grep -E '(^|/)(screenshots|tests|\.github|node_modules|\.git|README\.md|FEATURES\.md|CHANGELOG\.md)'

      - name: Upload release archive artifact
        uses: actions/upload-artifact@v7
        with:
          name: cobudget-release-package
          path: ../cobudget.tar.gz
          if-no-files-found: error
          retention-days: 14
